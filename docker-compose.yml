services:
  # RTSP Server - 串流伺服器中心
  rtsp-server:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP 埠
      - "8888:8888"   # HLS 埠 (可選用)
      - "8889:8889"   # WebRTC 埠 (可選用)
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    environment:
      - MTX_HLSVARIANT=fmp4
      - MTX_HLSALLOWORIGINS=*
      - MTX_WEBRTC=yes
    networks:
      - app-network

  # Stream Simulator - 模擬攝影機推流
  stream-simulator:
    image: linuxserver/ffmpeg:latest
    container_name: stream-simulator
    restart: unless-stopped
    depends_on:
      - rtsp-server
    volumes:
      - ../video:/videos:ro  # 掛載實體影片路徑
    networks:
      - app-network
    # 推流到 /simulator，避免覆蓋監控用的 /live（/live 改由外部 RTSP 拉流）
    command: >
      -re -stream_loop -1 
      -i "/videos/門禁遮臉入場/Video_衛哨端出入口.avi" 
      -vf "scale=426:240,fps=10,setpts=N/(10*TB)"
      -c:v libx264 -preset ultrafast -tune zerolatency -profile:v baseline -level 3.0 -g 20 -b:v 200k -maxrate 200k -bufsize 400k
      -bsf:v h264_mp4toannexb
      -an
      -f rtsp 
      -rtsp_transport tcp
      rtsp://rtsp-server:8554/simulator

  # ---------------------------------------------------------------------------
  # 推論服務埠一覽（給 backend 連線用；與「主機對外映射埠」不一定相同）
  #
  # | 服務        | 容器內 / 監聽        | backend 內建 URL（見下方 environment） |
  # |-------------|----------------------|----------------------------------------|
  # | ollama      | 11434（bridge）      | OLLAMA_BASE=http://ollama:11434        |
  # | vllm        | 8440（bridge）       | VLLM_BASE=http://vllm:8440             |
  # | vllm-qwen3  | host 網路，預設 8441 | QWEN3_VLLM_BASE=http://host.docker.internal:8441 |
  # | vllm-qwen3-awq | host 網路，預設 8442 | QWEN3_AWQ_VLLM_BASE=http://host.docker.internal:8442 |
  #
  # vllm-qwen3 / vllm-qwen3-awq 使用 network_mode: host，不在 app-network；vllm 走 bridge 故後端可用服務名 vllm。
  #
  # 前端僅透過 API 寫入偏好並探測就緒；不會自動 docker compose up/down，除非
  # VLM_ORCHESTRATION_ENABLED=true 且掛載 docker.sock（見 backend 註解）。
  # ---------------------------------------------------------------------------

  # Ollama Service
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    # ports:
    #   - "11434:11434"  # 移除端口映射，避免衝突。backend 可通過服務名 ollama:11434 訪問
    environment:
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:--1}
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app-network
    extra_hosts:
      - "registry.ollama.ai:104.16.55.3"
      - "registry.ollama.ai:104.16.54.3"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # vLLM（Qwen2.5-VL，bridge）— 後端預設 VLLM_BASE=http://vllm:8440。與 vllm-qwen3-awq 對齊：
  # QWEN3_AWQ_GPU_MEMORY_UTILIZATION / QWEN3_AWQ_MAX_MODEL_LEN、segment、allowed-local-media-path。
  # 離線預設 1（只讀掛載 HF cache，不連 huggingface.co）；學網／無 DNS 時勿設 0。要下載權重時 .env 設 VLLM_HF_OFFLINE=0。
  # 量化使用 awq_marlin（vLLM 對官方 Qwen2.5-VL-7B-Instruct-AWQ 建議；不支援時改回 --quantization awq）。
  vllm:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    environment:
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen2.5-VL-7B-Instruct-AWQ}
      - VLLM_HOST=0.0.0.0
      - VLLM_PORT=8440
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - TRANSFORMERS_OFFLINE=${VLLM_HF_OFFLINE:-1}
      - HF_HUB_OFFLINE=${VLLM_HF_OFFLINE:-1}
    volumes:
      - ${HF_CACHE_HOST:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
      - ./backend/segment:/app/segment:ro
    shm_size: "2gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - app-network
    ports:
      - "${VLLM_PORT:-8440}:8440"
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-VL-7B-Instruct-AWQ}
      --host 0.0.0.0
      --port 8440
      --trust-remote-code
      --dtype half
      --quantization awq_marlin
      --max-num-seqs 16
      --enable-chunked-prefill
      --gpu-memory-utilization ${QWEN3_AWQ_GPU_MEMORY_UTILIZATION:-0.7}
      --max-model-len ${QWEN3_AWQ_MAX_MODEL_LEN:-10240}
      --allowed-local-media-path /app/segment

  # Qwen3-VL（host network，預設主機 8441）— max context 由 QWEN3_MAX_MODEL_LEN 決定，與上方 vllm 的 56000 無關。
  # 多圖＋長 prompt 時若設太小會出現 vLLM 400：max_tokens 為負數；VRAM 不足再於 .env 調低。
  vllm-qwen3:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    environment:
      - QWEN3_MODEL=${QWEN3_MODEL:-Qwen/Qwen3-VL-8B-Instruct-FP8}
      - QWEN3_HOST=0.0.0.0
      - QWEN3_PORT=8441
      - QWEN3_GPU_MEMORY_UTILIZATION=${QWEN3_GPU_MEMORY_UTILIZATION:-0.7}
      - QWEN3_MAX_MODEL_LEN=${QWEN3_MAX_MODEL_LEN:-16384}
      - QWEN3_API_KEY=${QWEN3_API_KEY:-}
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      # 首次啟動通常需下載權重；若確定快取完整可在 .env 設 QWEN3_OFFLINE=1
      - TRANSFORMERS_OFFLINE=${QWEN3_OFFLINE:-0}
      - HF_HUB_OFFLINE=${QWEN3_OFFLINE:-0}
    volumes:
      - ${HF_CACHE_HOST:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
      # 讓 vLLM 可讀取 backend 切出的本地影片片段（video_direct 的 file:// URI）
      - ./backend/segment:/app/segment:ro
    shm_size: "2gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # 在學校網路環境下，bridge DNS 解析可能受限；改用 host network 取用主機 DNS
    network_mode: host
    command: >
      --model ${QWEN3_MODEL:-Qwen/Qwen3-VL-8B-Instruct-FP8}
      --host 0.0.0.0
      --port ${QWEN3_PORT:-8441}
      --trust-remote-code
      --dtype auto
      --gpu-memory-utilization ${QWEN3_GPU_MEMORY_UTILIZATION:-0.7}
      --max-model-len ${QWEN3_MAX_MODEL_LEN:-16384}
      --allowed-local-media-path /app/segment

  # Qwen3-VL AWQ（host network，預設主機 8442）
  vllm-qwen3-awq:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    environment:
      # 可用來源：
      # 1) HF repo（例：Junfeng-Pan/Qwen3-VL-8B-Instruct-AWQ）
      # 2) 本地快取 snapshot 路徑（容器內，如 /root/.cache/huggingface/hub/.../snapshots/<hash>）
      - QWEN3_AWQ_MODEL_SOURCE=${QWEN3_AWQ_MODEL_SOURCE:-Junfeng-Pan/Qwen3-VL-8B-Instruct-AWQ}
      # 對 API 暴露的模型名稱（前後端選單/請求使用這個）
      - QWEN3_AWQ_SERVED_MODEL_NAME=${QWEN3_AWQ_SERVED_MODEL_NAME:-Qwen/Qwen3-VL-8B-Instruct-AWQ}
      - QWEN3_AWQ_HOST=0.0.0.0
      - QWEN3_AWQ_PORT=8442
      - QWEN3_AWQ_GPU_MEMORY_UTILIZATION=${QWEN3_AWQ_GPU_MEMORY_UTILIZATION:-0.7}
      - QWEN3_AWQ_MAX_MODEL_LEN=${QWEN3_AWQ_MAX_MODEL_LEN:-16384}
      - QWEN3_AWQ_API_KEY=${QWEN3_AWQ_API_KEY:-}
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - TRANSFORMERS_OFFLINE=${QWEN3_AWQ_OFFLINE:-0}
      - HF_HUB_OFFLINE=${QWEN3_AWQ_OFFLINE:-0}
      # 設為 DEBUG 可在 logs 看到較多引擎內部訊息（量大）；預設 INFO
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
    volumes:
      - ${HF_CACHE_HOST:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
      - ./backend/segment:/app/segment:ro
    shm_size: "2gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    network_mode: host
    command: >
      --model ${QWEN3_AWQ_MODEL_SOURCE:-Junfeng-Pan/Qwen3-VL-8B-Instruct-AWQ}
      --served-model-name ${QWEN3_AWQ_SERVED_MODEL_NAME:-Qwen/Qwen3-VL-8B-Instruct-AWQ}
      --host 0.0.0.0
      --port ${QWEN3_AWQ_PORT:-8442}
      --trust-remote-code
      --dtype half
      --gpu-memory-utilization ${QWEN3_AWQ_GPU_MEMORY_UTILIZATION:-0.7}
      --max-model-len ${QWEN3_AWQ_MAX_MODEL_LEN:-10240}
      --max-num-seqs 16
      --enable-chunked-prefill
      --allowed-local-media-path /app/segment

  # PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg15  # 使用包含 pgvector 的官方映像
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin - PostgreSQL 圖形化管理工具
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    restart: unless-stopped
    # VLM 編排：rootless 須掛 DOCKER_SOCK_HOST=/run/user/<uid>/docker.sock。
    # 勿設 user:/group_add: 主機 uid/gid（易 setgroups invalid argument）；改 privileged + 正確 socket，行程維持預設 root。
    privileged: true
    security_opt:
      - label:disable
    shm_size: "2gb"  # 電腦視覺/多 worker 需較大 shared memory
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      # 明確指定 daemon socket（掛載目標固定為容器內 /var/run/docker.sock）
      - DOCKER_HOST=unix:///var/run/docker.sock
      - PROJECT_ROOT=${PROJECT_ROOT}
      - HOST=${HOST}
      - PORT=8080
      - RELOAD=${RELOAD:-false}
      # gunicorn：-w WORKERS，UvicornWorker；worker 死後 master 會再起。
      # uvicorn：WORKERS=1 為單一 process；WORKERS>1 則 uvicorn --workers N（多 process，仍非 Gunicorn）。
      - BACKEND_PROCESS_MANAGER=${BACKEND_PROCESS_MANAGER:-gunicorn}
      # 每個 worker 為獨立 process，各載一份 Qwen+YOLO+ReID（約 17GB/process）。在 .env 設 WORKERS=4 即會生效；預設 1 避免單機 VRAM 不足。
      - WORKERS=${WORKERS:-1}
      - PRELOAD_CLIP=${PRELOAD_CLIP:-false}
      - PRELOAD_YOLO_REID=${PRELOAD_YOLO_REID:-true}
      - PRELOAD_SENTENCE_TRANSFORMER=${PRELOAD_SENTENCE_TRANSFORMER:-true}
      - LOG_LEVEL=${LOG_LEVEL}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - SESSION_TTL_SEC=${SESSION_TTL_SEC}
      - AUTO_RAG_INDEX=true
      - RAG_DIR=./rag_store
      - RAG_STORE_DIR=./rag_store
      - OLLAMA_EMBED_MODEL=bge-m3
      - OLLAMA_LLM_MODEL=qwen2.5vl:latest
      - OLLAMA_BASE=http://ollama:11434
      - OLLAMA_REQUEST_TIMEOUT=600
      # 與服務 vllm 容器埠一致（bridge 內 8440）；勿與 Qwen3 的 8441 混淆
      - VLLM_BASE=${VLLM_BASE:-http://vllm:8440}
      # Qwen3 服務為 host network，請對主機埠（預設 8441），勿填 http://vllm-qwen3:8441
      - QWEN3_VLLM_BASE=${QWEN3_VLLM_BASE:-http://host.docker.internal:8441}
      # Qwen3 AWQ 服務為 host network，預設主機 8442
      - QWEN3_AWQ_VLLM_BASE=${QWEN3_AWQ_VLLM_BASE:-http://host.docker.internal:8442}
      # 讓 backend 容器內執行 compose 時可用相同 AWQ 來源設定（避免回退到 compose 預設值）
      - QWEN3_AWQ_MODEL_SOURCE=${QWEN3_AWQ_MODEL_SOURCE:-}
      - QWEN3_AWQ_SERVED_MODEL_NAME=${QWEN3_AWQ_SERVED_MODEL_NAME:-Qwen/Qwen3-VL-8B-Instruct-AWQ}
      - QWEN3_AWQ_GPU_MEMORY_UTILIZATION=${QWEN3_AWQ_GPU_MEMORY_UTILIZATION:-0.7}
      # 遠端 vLLM 批次同時 HTTP 連線數（預設 8）；設 1 則逐筆送，易拖慢 pipeline
      - VLLM_BATCH_MAX_WORKERS=${VLLM_BATCH_MAX_WORKERS:-8}
      - VLLM_API_KEY=${VLLM_API_KEY:-}
      # Video Direct：每段影片送 vLLM 的均勻取樣幀數 = ceil(segment_duration × SAMPLE_FPS)，上限 MAX_FRAMES
      - VLLM_VIDEO_DIRECT_SAMPLE_FPS=${VLLM_VIDEO_DIRECT_SAMPLE_FPS:-5}
      - VLLM_VIDEO_DIRECT_MAX_FRAMES=${VLLM_VIDEO_DIRECT_MAX_FRAMES:-256}
      - VLLM_VIDEO_DIRECT_NUM_FRAMES=${VLLM_VIDEO_DIRECT_NUM_FRAMES:-}
      - VLLM_VIDEO_DIRECT_MAX_COMPLETION_TOKENS=${VLLM_VIDEO_DIRECT_MAX_COMPLETION_TOKENS:-4096}
      # --- VLM 自動編排（釋放 VRAM：例如切到 Qwen2.5 時 stop vllm-qwen3 再 up vllm）---
      # .env 須設 VLM_COMPOSE_PROJECT_NAME=與主機 compose 專案名相同（例 test_platform-main），否則 stop 會找不到容器。
      # 預設 false。要啟用請在 .env 設 VLM_ORCHESTRATION_ENABLED=true，並取消註解下方 docker.sock + vlm-compose-host，
      # 再設 VLM_COMPOSE_FILE=/vlm-compose-host/docker-compose.yml 與 VLM_COMPOSE_PROJECT_DIR=/vlm-compose-host，重建 backend。
      # 風險：backend 可對主機執行 docker compose（等同高權限），僅限信任環境。
      # VLM 自動編排：backend 容器內路徑須指向「可讀」的 compose 檔（勿用宿主機絕對路徑，除非有 bind mount）。
      # 例：於下方 volumes 取消註解 .:/vlm-compose-host:ro 後，設
      #   VLM_COMPOSE_FILE=/vlm-compose-host/docker-compose.yml
      #   VLM_COMPOSE_PROJECT_DIR=/vlm-compose-host
      - VLM_ORCHESTRATION_ENABLED=${VLM_ORCHESTRATION_ENABLED:-false}
      - VLM_COMPOSE_FILE=${VLM_COMPOSE_FILE:-}
      - VLM_COMPOSE_PROJECT_DIR=${VLM_COMPOSE_PROJECT_DIR:-}
      - VLM_COMPOSE_PROJECT_DIR_HOST=${VLM_COMPOSE_PROJECT_DIR_HOST:-}
      - VLM_COMPOSE_PROJECT_NAME=${VLM_COMPOSE_PROJECT_NAME:-}
      # vLLM profile 時是否一併 docker stop ollama（單卡釋放 VRAM；RAG「回答」若依賴 Ollama LLM 請設 false）
      - VLM_ORCHESTRATION_STOP_OLLAMA_ON_VLLM=${VLM_ORCHESTRATION_STOP_OLLAMA_ON_VLLM:-false}
      # 讓 backend 容器內執行 docker compose 時，仍可正確展開 ${HF_CACHE_HOST}（避免回退成 /root/.cache/huggingface）
      - HF_CACHE_HOST=${HF_CACHE_HOST:-${HOME}/.cache/huggingface}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MY_API_KEY=${MY_API_KEY}
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MOONDREAM_MODELS_DIR=/app/models
      # 離線或無法下載時：先在本機執行 mkdir -p yolo_weights && wget -O yolo_weights/yolov8s-world.pt https://github.com/ultralytics/assets/releases/download/v8.4.0/yolov8s-world.pt
      - YOLO_WEIGHTS_PATH=/app/yolo_weights/yolov8s-world.pt
      # Moondream 等 trust_remote_code 會寫入 cache；與下方 volume 對應
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      # 容器無外網：huggingface_hub 與 transformers 皆不連線
      - TRANSFORMERS_OFFLINE=1
      - HF_HUB_OFFLINE=1
      - QWEN_25VL_SNAPSHOT_PATH=${QWEN_25VL_SNAPSHOT_PATH:-}
      - QWEN_USE_QUANTIZATION=1
      # TorchAO 量化與 torch.compile 衝突會導致 meta/cuda 錯誤，從 process 啟動就停用 dynamo
      - TORCHDYNAMO_DISABLE=1
    volumes:
      - ./models:/app/models
      - ./yolo_weights:/app/yolo_weights
      - backend_hf_cache:/app/.cache/huggingface
      - ./backend/src:/app/src:delegated
      - ./backend/segment:/app/segment
      - ./backend/rag_store:/app/rag_store
      - ./backend/prompts:/app/prompts
      - ../video:/app/video:ro
      # VLM 自動編排：主機 socket 路徑可用 .env 的 DOCKER_SOCK_HOST（rootless 時常非 /var/run/docker.sock）
      - ${DOCKER_SOCK_HOST:-/var/run/docker.sock}:/var/run/docker.sock
      - .:/vlm-compose-host:ro
      # 本機 HF cache：與 .env 的 HF_CACHE_HOST 對應（離線權重）
      - ${HF_CACHE_HOST:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 勿在此設定 dns: 8.8.8.8 — 會覆寫 Docker 內建 DNS，導致無法解析同網路服務名（vllm、postgres）。
    # 需要對外 DNS 時請改在 docker daemon 設定，或維持不寫 dns（使用預設，內建 127.0.0.11 可解析服務名）。
    # ports:
    #   - "8080:8080"  # 移除對外暴露，改由 nginx 反向代理
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      rtsp-server: # 確保 backend 知道 rtsp-server 存在
        condition: service_started
    healthcheck:
      # 當 worker 全死導致 API 無回應時，healthcheck 失敗會觸發容器重啟
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=10)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

    # --- 以下為舊參數對照（純 Gunicorn）；實際啟動改由下方 command 依 BACKEND_PROCESS_MANAGER 決定 ---
    # 舊版曾用：--timeout 600 --graceful-timeout 10
    # 現行 gunicorn 分支：--timeout 0（停用 worker 靜默逾時殺進程）、--graceful-timeout 3600；無 --max-requests
    # command: >
    #   gunicorn
    #   -k uvicorn.workers.UvicornWorker
    #   -w ${WORKERS:-1}
    #   -b ${HOST:-0.0.0.0}:${PORT:-8080}
    #   --timeout 0
    #   --graceful-timeout 3600
    #   --log-level ${LOG_LEVEL:-info}
    #   src.main:app
    # --- 對照結束 ---

    command:
      - sh
      - -lc
      - |
        set -e
        if [ "${BACKEND_PROCESS_MANAGER:-gunicorn}" = "uvicorn" ]; then
          if [ "${WORKERS:-1}" -le 1 ]; then
            exec uvicorn src.main:app \
              --host "${HOST:-0.0.0.0}" \
              --port "${PORT:-8080}" \
              --timeout-keep-alive 600 \
              --log-level "${LOG_LEVEL:-info}"
          else
            exec uvicorn src.main:app \
              --host "${HOST:-0.0.0.0}" \
              --port "${PORT:-8080}" \
              --workers "${WORKERS:-1}" \
              --timeout-keep-alive 600 \
              --log-level "${LOG_LEVEL:-info}"
          fi
        else
          exec gunicorn \
            -k uvicorn.workers.UvicornWorker \
            -w "${WORKERS:-1}" \
            -b "${HOST:-0.0.0.0}:${PORT:-8080}" \
            --timeout 0 \
            --graceful-timeout 3600 \
            --log-level "${LOG_LEVEL:-info}" \
            src.main:app
        fi

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    restart: unless-stopped
    environment:
      # 不設置 REACT_APP_API_BASE，讓前端根據 hostname 自動選擇
      # - REACT_APP_API_BASE=http://localhost:8080  # 已移除，改為自動檢測
      # 必須綁 0.0.0.0，否則 webpack dev server 只聽 127.0.0.1，nginx 反代 frontend:3000 會 502
      - HOST=0.0.0.0
      # 經 nginx 以不同 Host 存取 dev server 時避免 Invalid Host header
      - DANGEROUSLY_DISABLE_HOST_CHECK=true
      - WDS_SOCKET_HOST=localhost
      - WDS_SOCKET_PORT=3000
    volumes:
      - ./frontend:/app:delegated
      # - node_modules_data:/app/node_modules
    # ports:
    #   - "3000:3000"  # 移除對外暴露，改由 nginx 反向代理
    networks:
      - app-network
    depends_on:
      - backend

  # Nginx Reverse Proxy - 統一入口
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3000:80"      # 廠商開放 3000，所以 Nginx 監聽 3000（映射到容器內部的 80）
      # - "8080:80"    # 備用：如果廠商也開放 8080，可以同時監聽兩個端口
    networks:
      - app-network
    depends_on:
      - backend
      - frontend

networks:
  app-network:
    driver: bridge

volumes:
  node_modules_data:
  ollama_data:
  postgres_data:
  pgadmin_data:
  backend_hf_cache:

