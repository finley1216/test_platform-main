events {
    # 單 worker 可同時接受的連線數（仍受 Linux ulimit 與 RAM 上限；無法真正「無限」）
    worker_connections 16384;
    use epoll;
    multi_accept on;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_min_length 1000;
    gzip_disable "msie6";

    # Rate limiting zones（僅 / 仍使用 general；/api 已關閉限速以利壓測，上線環境請自行恢復）
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    # Custom log format for deep diagnostics (Point 13)
    log_format diagnostic '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'rt=$request_time urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log diagnostic;

    add_header 'Cache-Control' 'no-transform';

    # WebSocket upgrade helper must be defined at http scope
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Docker 內建 DNS，讓 Nginx 在每次請求時解析 backend 主機名（避免 Nginx 先啟動時解析失敗導致 502）
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 不使用 keepalive，避免重用已被後端關閉的連線導致 502（長請求後 uvicorn 可能關閉連線）
    upstream backend {
        server backend:8080;
    }

    upstream rtsp-server {
        server rtsp-server:8888;
        keepalive 32;
    }

    # HTTP server
    server {
        listen 80;
        server_name _;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Increase body size for large video uploads (10GB limit)
        client_max_body_size 10G;
        client_body_buffer_size 256k;
        client_header_buffer_size 2k;
        large_client_header_buffers 8 32k;
        
        # Increase timeouts for large file uploads
        client_body_timeout 3600s;
        client_header_timeout 3600s;

        # Common proxy settings
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts
        proxy_connect_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        # HLS Stream Proxy - 代理 MediaMTX 的 HLS 流
        location ^~ /hls/ {
            # CORS headers for HLS streaming
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Range';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # Disable buffering for streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_redirect off;

            # Streaming-specific settings
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Long timeouts for streaming
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Remove /hls prefix and proxy to rtsp-server
            rewrite ^/hls(/.*)$ $1 break;
            proxy_pass http://rtsp-server;
        }

        # MediaMTX 內建播放器會請求 /live/...（無 /hls 前綴），需一併代理否則會出現 stream not found
        location ^~ /live/ {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Range';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            proxy_buffering off;
            proxy_cache off;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_pass http://rtsp-server;
        }

        # Segment 靜態檔案（物件切片、影片等）由 backend 的 /segment 提供
        location ^~ /segment/ {
            set $backend_upstream backend:8080;
            add_header 'Access-Control-Allow-Origin' '*' always;
            proxy_pass http://$backend_upstream;
            proxy_buffering off;
            proxy_cache off;
        }

        # Backend API - 將所有 /api/* 請求轉發到 backend:8080
        location ^~ /api/ {
            set $backend_upstream backend:8080;
            # 已移除 limit_req（先前 zone=api 為 5r/s + burst=10，30 路同時 POST 會大量 503）
            # 若需對外服務，建議改為較寬鬆的 rate 或只對非上傳路徑限速

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # Buffering settings
            proxy_buffering off;
            proxy_cache off;
            proxy_redirect off;

            # 大檔上傳：不緩衝整份 body，直接轉發給後端，避免 Nginx 記憶體與逾時問題
            proxy_request_buffering off;
            # 影片上傳+分析可能超過 60s，必須顯式拉長（預設 60s 會導致 segment_pipeline_multipart 502）
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            # 移除 /api 前綴，轉發到後端
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://$backend_upstream;
        }

        # React frontend（webpack dev server）— 使用變數 proxy_pass 以配合 resolver，frontend 容器重啟換 IP 後仍會重新解析，避免連到舊 IP 而出現 connection refused（含 /ws HMR）
        location / {
            # Rate limiting
            limit_req zone=general burst=20 nodelay;

            # Add CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # Buffering settings for streaming responses
            proxy_buffering off;
            proxy_cache off;

            # Preserve the original request URI for proper routing
            proxy_redirect off;

            # WebSocket / HMR 長連線
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream;
        }

        # Error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}

